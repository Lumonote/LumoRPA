# cargo-deny configuration — supply-chain + license gate (P1-9).
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# The allow-list below was derived from `cargo deny list` over the actual
# dependency tree (all permissive plus the file-level-copyleft MPL-2.0 and the
# CDLA-Permissive-2.0 data license used by webpki-roots). Strong copyleft
# (GPL/AGPL) is absent and stays disallowed by omission, so a future dep that
# drags one in fails CI loudly.

[graph]
# Evaluate every feature so optional deps can't smuggle in an unvetted license.
all-features = true

[advisories]
# RUSTSEC advisory database. cargo-deny denies vulnerability/unsound advisories
# by default; we additionally refuse yanked crates. `unmaintained = "workspace"`
# scopes the unmaintained-crate check to our own direct dependencies — a deep
# transitive unmaintained crate we can't act on (e.g. proc-macro-error pulled in
# by tooling) shouldn't redden CI, but security advisories always will. Suppress
# individual IDs via `ignore` (with a comment) only after a deliberate review.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are normal churn in a large tree; warn so the gate stays
# focused on real supply-chain risk rather than dependency-graph noise.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
