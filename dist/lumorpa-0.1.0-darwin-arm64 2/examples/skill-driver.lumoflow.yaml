apiVersion: lumorpa.io/v1
kind: Flow
metadata:
  id: skill-driver
  version: 0.1.0
  name: Skill 调用示例
  description: 通过 skill.invoke 串联本地 skills（greet / json-roundtrip），演示 Skill 注册与调用闭环。
spec:
  inputs:
    - { name: who, type: string, default: lumorpa }
  steps:
    - id: invoke_greet
      action: skill.invoke
      with:
        name: greet
        inputs:
          who: "{{ inputs.who }}"

    - id: invoke_roundtrip
      action: skill.invoke
      with:
        name: json-roundtrip
        inputs:
          payload: { kind: order, total: 42 }

    - id: log_outputs
      action: control.log
      with:
        message: "greet => {{ steps.invoke_greet.result.outputs }} | roundtrip => {{ steps.invoke_roundtrip.result.outputs }}"
