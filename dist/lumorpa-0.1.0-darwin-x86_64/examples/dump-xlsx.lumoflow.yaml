apiVersion: lumorpa.io/v1
kind: Flow
metadata:
  id: dump-xlsx
  version: 0.1.0
spec:
  inputs:
    - { name: file, type: file, required: true }
    - { name: out,  type: file, default: "/tmp/dump.json" }
  capabilities:
    fs.read: ["*"]
    fs.write: ["/tmp/**"]
  steps:
    - id: read
      action: excel.read_rows
      with: { file: "{{ inputs.file }}", header: true }
    - id: write
      action: file.write
      with:
        path: "{{ inputs.out }}"
        content: "{{ steps.read.result | tojson }}"
